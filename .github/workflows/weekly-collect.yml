name: Weekly News Collection

on:
  schedule:
    # 매주 월요일 09:00 KST (= 일요일 24:00 UTC)
    - cron: "0 0 * * 1"
  workflow_dispatch: # 수동 실행 가능

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly article collection
        env:
          DOORAY_API_TOKEN: ${{ secrets.DOORAY_API_TOKEN }}
        run: python main.py --articles-only

      - name: Upload output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-articles-${{ github.run_number }}
          path: output/
          retention-days: 30