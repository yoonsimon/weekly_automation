<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기사 생성 - KR EC Trend</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/css/style.css?v=11">
</head>
<body>

  <div class="shell">
    <!-- LNB -->
    <aside class="lnb">
      <a href="/" class="lnb__brand">KR EC Trend</a>
      <nav class="lnb__nav">
        <a href="/generate" class="lnb__item lnb__item--active">
          <svg class="lnb__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <span class="lnb__label">기사 생성</span>
        </a>
        <a href="/notices" class="lnb__item">
          <svg class="lnb__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M9 14l2 2 4-4"/></svg>
          <span class="lnb__label">공지사항</span>
        </a>
        <a href="/log" class="lnb__item">
          <svg class="lnb__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
          <span class="lnb__label">이력</span>
        </a>
      </nav>
    </aside>

    <!-- Main -->
    <div class="shell__main">
      <header class="header">
        <svg class="header__icon" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="7" fill="#EC1D31"/><path d="M7 22l5-6 4 3 9-12" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 7h4v4" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <h3 class="header__title">기사 생성</h3>
      </header>

      <main class="container">

    <!-- State 0: Idle -->
    <section id="state-idle" class="section">
      <div class="page-intro">
        <h2 id="idle-week-title" class="page-intro__title"></h2>
        <p class="page-intro__desc">수집부터 기사 카드 생성까지 자동으로 진행합니다</p>

        <div class="mini-stepper">
          <div class="mini-stepper__step">
            <div class="mini-stepper__icon">1</div>
            <div class="mini-stepper__label">뉴스 수집</div>
          </div>
          <div class="mini-stepper__connector"></div>
          <div class="mini-stepper__step">
            <div class="mini-stepper__icon">2</div>
            <div class="mini-stepper__label">분석/선별</div>
          </div>
          <div class="mini-stepper__connector"></div>
          <div class="mini-stepper__step">
            <div class="mini-stepper__icon">3</div>
            <div class="mini-stepper__label">본문 스크래핑</div>
          </div>
          <div class="mini-stepper__connector"></div>
          <div class="mini-stepper__step">
            <div class="mini-stepper__icon">4</div>
            <div class="mini-stepper__label">기사 생성</div>
          </div>
        </div>

        <button id="btn-start" class="btn btn--primary btn--lg">생성 시작하기</button>
        <div id="idle-last-info" class="page-intro__last hidden"></div>
      </div>
    </section>

    <!-- State 1: Progress -->
    <section id="state-progress" class="section hidden">
      <div class="card">
        <div class="progress-container">
          <!-- Stepper -->
          <div class="stepper" id="stepper">
            <div class="stepper__step" data-step="collecting">
              <div class="stepper__icon">1</div>
              <div class="stepper__label">뉴스 수집</div>
            </div>
            <div class="stepper__connector"></div>
            <div class="stepper__step" data-step="scoring">
              <div class="stepper__icon">2</div>
              <div class="stepper__label">분석/선별</div>
            </div>
            <div class="stepper__connector"></div>
            <div class="stepper__step" data-step="scraping">
              <div class="stepper__icon">3</div>
              <div class="stepper__label">본문 스크래핑</div>
            </div>
            <div class="stepper__connector"></div>
            <div class="stepper__step" data-step="ready">
              <div class="stepper__icon">4</div>
              <div class="stepper__label">완료</div>
            </div>
          </div>

          <div class="progress-bar-wrap">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
          <div id="progress-step" class="progress-step">준비 중...</div>
          <div id="progress-message" class="progress-message"></div>

          <!-- Error retry -->
          <div id="progress-error" class="progress-error hidden">
            <p id="progress-error-msg" class="progress-error__msg"></p>
            <button id="btn-retry" class="btn btn--primary" style="margin-top:12px;">다시 시도</button>
          </div>
        </div>
      </div>
    </section>

    <!-- State 2: Articles / Preview -->
    <section id="state-articles" class="section hidden">

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="tab-cards">기사 카드</button>
        <button class="tab-btn" data-tab="tab-preview">MD 미리보기</button>
        <button class="tab-btn" data-tab="tab-images">원본 이미지</button>
      </div>

      <!-- Tab 1: Article Cards -->
      <div id="tab-cards" class="tab-panel active">

        <!-- 메인 톱픽 -->
        <div class="category-group">
          <div class="category-group__header">
            <div class="category-group__title">메인 톱픽 <span id="stats-main"></span></div>
            <div class="category-group__actions">
              <select class="sort-select" data-category="main">
                <option value="default">기본순</option>
                <option value="score-desc">점수 높은순</option>
                <option value="score-asc">점수 낮은순</option>
                <option value="date-desc">최신순</option>
              </select>
              <button class="btn btn--outline btn--sm select-all-btn" data-category="main">전체 선택</button>
            </div>
          </div>
          <div id="cards-main"></div>
        </div>

        <!-- 기타 커머스/IT 동향 -->
        <div class="category-group">
          <div class="category-group__header">
            <div class="category-group__title">기타 커머스/IT 동향 <span id="stats-other"></span></div>
            <div class="category-group__actions">
              <select class="sort-select" data-category="other">
                <option value="default">기본순</option>
                <option value="score-desc">점수 높은순</option>
                <option value="score-asc">점수 낮은순</option>
                <option value="date-desc">최신순</option>
              </select>
              <button class="btn btn--outline btn--sm select-all-btn" data-category="other">전체 선택</button>
            </div>
          </div>
          <div id="cards-other"></div>
        </div>

        <!-- 오픈마켓/소셜커머스 -->
        <div class="category-group">
          <div class="category-group__header">
            <div class="category-group__title">오픈마켓/소셜커머스 <span id="stats-market"></span></div>
            <div class="category-group__actions">
              <select class="sort-select" data-category="market">
                <option value="default">기본순</option>
                <option value="score-desc">점수 높은순</option>
                <option value="score-asc">점수 낮은순</option>
                <option value="date-desc">최신순</option>
              </select>
              <button class="btn btn--outline btn--sm select-all-btn" data-category="market">전체 선택</button>
            </div>
          </div>
          <div id="cards-market"></div>
        </div>

      </div>

      <!-- Tab 2: MD Preview -->
      <div id="tab-preview" class="tab-panel">
        <div id="md-preview-content" class="md-preview">
          <div class="text-center" style="padding:32px"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Tab 3: Original Images -->
      <div id="tab-images" class="tab-panel">
        <div class="images-toolbar">
          <span id="images-count"></span>
          <div class="images-toolbar__spacer"></div>
          <button id="btn-download-zip" class="btn btn--primary btn--sm">전체 다운로드 (ZIP)</button>
        </div>
        <div id="images-grid" class="images-grid"></div>
      </div>

      <!-- Action Bar -->
      <div class="action-bar">
        <span id="selected-count" class="action-bar__count">선택: 0건</span>
        <div class="action-bar__spacer"></div>
        <button id="btn-replace" class="btn btn--secondary" disabled>선택 기사 교체</button>
        <button id="btn-confirm" class="btn btn--primary">확정 저장</button>
        <button id="btn-upload" class="btn btn--success" disabled>업로드</button>
      </div>

    </section>

    <!-- State 3: Complete -->
    <section id="state-complete" class="section hidden">
      <div class="page-intro">
        <h2 class="page-intro__title">업로드 완료</h2>
        <p id="complete-message" class="page-intro__desc">업로드가 완료되었습니다.</p>
        <a href="/" class="btn btn--primary btn--lg">대시보드로 돌아가기</a>
      </div>
    </section>

      </main>
    </div>
  </div>

  <!-- Replacement Modal -->
  <div id="replace-modal" class="overlay hidden">
    <div class="modal">
      <div class="modal__header">
        <h3 class="modal__title">기사 교체 비교</h3>
      </div>
      <div class="modal__content">
        <div id="replace-modal-body"></div>
      </div>
      <div class="modal__footer">
        <button id="btn-replace-cancel" class="btn btn--secondary btn--sm">취소</button>
        <button id="btn-replace-retry" class="btn btn--secondary btn--sm">다시 교체</button>
        <button id="btn-replace-approve" class="btn btn--primary btn--sm">교체 승인</button>
      </div>
    </div>
  </div>

  <!-- Wiki URL 입력 Modal -->
  <div id="wiki-url-modal" class="overlay hidden">
    <div class="modal" style="max-width:540px;">
      <div class="modal__header">
        <h3 class="modal__title">업로드 위치 선택</h3>
      </div>
      <div class="modal__content" style="padding:16px 24px;">

        <!-- 이전에 사용한 페이지 목록 -->
        <div id="recent-pages-section" class="hidden">
          <p style="margin-bottom:8px; font-size:13px; color:var(--color-text-secondary); font-weight:600;">최근 사용한 위키 페이지</p>
          <div id="recent-pages-list" style="display:flex; flex-direction:column; gap:6px; margin-bottom:16px;"></div>
        </div>

        <!-- 새 URL 입력 -->
        <p style="margin-bottom:8px; font-size:13px; color:var(--color-text-secondary); font-weight:600;">새 위키 페이지 URL</p>
        <div style="display:flex; gap:8px; align-items:flex-start;">
          <input type="text" id="wiki-url-input"
                 placeholder="https://nhnent.dooray.com/wiki/..."
                 style="flex:1; padding:10px 12px; border:1px solid var(--color-border); border-radius:8px; font-size:14px;">
          <button id="btn-wiki-url-verify" class="btn btn--secondary btn--sm" style="white-space:nowrap; padding:10px 14px;">확인</button>
        </div>
        <p id="wiki-url-error" class="hidden" style="margin-top:8px; color:var(--color-danger); font-size:13px;"></p>

        <!-- 확인된 페이지 정보 -->
        <div id="wiki-url-resolved" class="hidden" style="margin-top:12px; padding:12px; background:var(--color-primary-light); border-radius:8px; border:1px solid var(--color-indigo-100);">
          <div style="display:flex; align-items:center; gap:8px;">
            <span style="color:var(--color-primary); font-weight:600;" id="resolved-page-name"></span>
          </div>
          <div style="margin-top:4px; font-size:12px; color:var(--color-text-muted);" id="resolved-page-id"></div>
        </div>

      </div>
      <div class="modal__footer">
        <button id="btn-wiki-url-cancel" class="btn btn--secondary btn--sm">취소</button>
        <button id="btn-wiki-url-upload" class="btn btn--primary btn--sm" disabled>업로드</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/static/js/api.js?v=5"></script>
  <script src="/static/js/wiki-modal.js?v=1"></script>
  <script src="/static/js/generate.js?v=6"></script>
</body>
</html>
