<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기사 생성 - 주간 뉴스 대시보드</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container">
      <a href="/" class="header__back">&larr; 대시보드</a>
      <h1 class="header__title">기사 생성</h1>
      <span></span>
    </div>
  </header>

  <main class="container">

    <!-- State 1: Progress -->
    <section id="state-progress" class="section">
      <div class="card">
        <div class="progress-container">
          <h2 style="font-size:1.15rem; font-weight:700; margin-bottom:8px;">기사 수집 및 분석 중</h2>
          <div class="progress-bar-wrap">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
          <div id="progress-step" class="progress-step">준비 중...</div>
          <div id="progress-message" class="progress-message"></div>
        </div>
      </div>
    </section>

    <!-- State 2: Articles / Preview -->
    <section id="state-articles" class="section hidden">

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="tab-cards">기사 카드</button>
        <button class="tab-btn" data-tab="tab-preview">MD 미리보기</button>
      </div>

      <!-- Tab 1: Article Cards -->
      <div id="tab-cards" class="tab-panel active">

        <!-- 메인 톱픽 -->
        <div class="category-group">
          <div class="category-group__title">메인 톱픽 (1)</div>
          <div id="cards-main"></div>
        </div>

        <!-- 오픈마켓/소셜커머스 -->
        <div class="category-group">
          <div class="category-group__title">오픈마켓/소셜커머스 (3)</div>
          <div id="cards-market"></div>
        </div>

        <!-- 기타 커머스/IT 동향 -->
        <div class="category-group">
          <div class="category-group__title">기타 커머스/IT 동향 (3)</div>
          <div id="cards-other"></div>
        </div>

      </div>

      <!-- Tab 2: MD Preview -->
      <div id="tab-preview" class="tab-panel">
        <div id="md-preview-content" class="md-preview">
          <div class="text-center" style="padding:32px"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- Action Bar -->
      <div class="action-bar">
        <span id="selected-count" style="font-size:0.85rem; color:var(--color-text-secondary);">선택: 0건</span>
        <div class="action-bar__spacer"></div>
        <button id="btn-replace" class="btn btn--secondary" disabled>선택 기사 교체</button>
        <button id="btn-confirm" class="btn btn--primary">확정 저장</button>
        <button id="btn-upload" class="btn btn--success" disabled>업로드</button>
      </div>

    </section>

    <!-- State 3: Complete -->
    <section id="state-complete" class="section hidden">
      <div class="card card--hero">
        <h2 style="font-size:1.15rem; font-weight:700; margin-bottom:8px;">완료</h2>
        <p id="complete-message">업로드가 완료되었습니다.</p>
        <a href="/" class="btn btn--primary" style="margin-top:12px;">대시보드로 돌아가기</a>
      </div>
    </section>

  </main>

  <!-- Replacement Modal -->
  <div id="replace-modal" class="overlay hidden">
    <div class="modal">
      <h3 class="modal__title">기사 교체 비교</h3>
      <div id="replace-modal-body"></div>
      <div class="modal__footer">
        <button id="btn-replace-cancel" class="btn btn--secondary btn--sm">취소</button>
        <button id="btn-replace-retry" class="btn btn--secondary btn--sm">다시 교체</button>
        <button id="btn-replace-approve" class="btn btn--primary btn--sm">교체 승인</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/generate.js"></script>
</body>
</html>
