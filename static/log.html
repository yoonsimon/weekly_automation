<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전체 생성 이력 - KR EC Trend</title>
  <link rel="stylesheet" href="/static/css/style.css?v=10">
</head>
<body>

  <div class="shell">
    <!-- LNB -->
    <aside class="lnb">
      <a href="/" class="lnb__brand">KR EC Trend</a>
      <nav class="lnb__nav">
        <a href="/generate" class="lnb__item">
          <svg class="lnb__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <span class="lnb__label">기사 생성</span>
        </a>
        <a href="/notices" class="lnb__item">
          <svg class="lnb__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M9 14l2 2 4-4"/></svg>
          <span class="lnb__label">공지사항</span>
        </a>
        <a href="/log" class="lnb__item lnb__item--active">
          <svg class="lnb__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
          <span class="lnb__label">이력</span>
        </a>
      </nav>
    </aside>

    <!-- Main -->
    <div class="shell__main">
      <header class="header">
        <div class="container">
          <h1 class="header__title">전체 생성 이력</h1>
        </div>
      </header>

      <main class="container">

    <!-- COS 검색 필터 (테이블 레이아웃) -->
    <section class="section">
      <form id="filter-form" onsubmit="return false;">
        <table class="cos-filter-table">
          <tbody>
            <tr>
              <td class="cos-filter-label">기간</td>
              <td class="cos-filter-input" colspan="3">
                <div style="display:flex; align-items:center; gap:8px;">
                  <input type="date" id="date-from" style="width:150px;">
                  <span style="color:var(--color-text-muted);">~</span>
                  <input type="date" id="date-to" style="width:150px;">
                </div>
              </td>
            </tr>
            <tr>
              <td class="cos-filter-label">검색어</td>
              <td class="cos-filter-input" colspan="3">
                <div style="display:flex; align-items:center; gap:8px;">
                  <input type="text" id="search-text" placeholder="키워드 검색..." style="flex:1; max-width:360px;">
                  <div class="cos-filter-actions">
                    <button type="submit" id="search-btn" class="btn btn--primary btn--sm">검색</button>
                    <button type="button" id="reset-btn" class="btn btn--secondary btn--sm">초기화</button>
                  </div>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </form>
    </section>

    <!-- TOAST UI Grid 이력 테이블 -->
    <section class="section">
      <table class="data-table" id="log-table">
        <thead>
          <tr>
            <th>기간</th>
            <th style="width:100px;text-align:center;">기사수</th>
            <th style="width:120px;text-align:center;">상태</th>
            <th style="width:150px;">생성일</th>
            <th style="width:100px;text-align:center;"></th>
          </tr>
        </thead>
        <tbody id="log-tbody"></tbody>
      </table>
      <!-- Custom Pagination -->
      <div id="custom-pagination" class="custom-pagination"></div>
    </section>

      </main>
    </div>
  </div>

  <!-- Markdown 조회 Modal -->
  <div id="md-modal" class="overlay hidden">
    <div class="modal">
      <div class="modal__header" style="display:flex; align-items:center; justify-content:space-between; margin: 10px;">
        <h3 class="modal__title" style="margin:0;">마크다운 미리보기</h3>
        <button id="md-modal-close" class="btn btn--secondary btn--sm">닫기</button>
      </div>
      <div class="modal__content">
        <div class="tabs" style="margin-top: 16px;">
          <button class="modal-tab-btn active" data-modal-tab="modal-tab-md">마크다운</button>
          <button class="modal-tab-btn" data-modal-tab="modal-tab-images">원본 이미지</button>
        </div>
        <div id="modal-tab-md" class="modal-tab-panel active">
          <div id="md-modal-content" class="md-preview">
            불러오는 중...
          </div>
        </div>
        <div id="modal-tab-images" class="modal-tab-panel">
          <div class="images-toolbar">
            <span id="modal-images-count"></span>
            <div class="images-toolbar__spacer"></div>
            <button id="btn-modal-download-zip" class="btn btn--primary btn--sm">전체 다운로드 (ZIP)</button>
          </div>
          <div id="modal-images-grid" class="images-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/static/js/api.js?v=5"></script>
  <script src="/static/js/log.js?v=5"></script>
</body>
</html>
