<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전체 생성 이력 - 주간 뉴스 대시보드</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container">
      <a href="/" class="header__back">&larr; 대시보드</a>
      <h1 class="header__title">전체 생성 이력</h1>
      <span></span>
    </div>
  </header>

  <main class="container">

    <!-- Filters -->
    <section class="section">
      <form id="filter-form" class="filters" onsubmit="return false;">
        <div class="filter-group">
          <label for="date-from">시작일</label>
          <input type="date" id="date-from" name="date_from">
        </div>
        <div class="filter-group">
          <label for="date-to">종료일</label>
          <input type="date" id="date-to" name="date_to">
        </div>
        <div class="filter-group">
          <label for="search-text">검색어</label>
          <input type="text" id="search-text" name="search" placeholder="키워드 검색...">
        </div>
        <div class="filter-group" style="justify-content:flex-end;">
          <label>&nbsp;</label>
          <button type="submit" id="search-btn" class="btn btn--primary btn--sm">검색</button>
        </div>
      </form>
    </section>

    <!-- History Table -->
    <section class="section">
      <div id="log-table-wrap" class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>기간</th>
              <th>기사수</th>
              <th>상태</th>
              <th>생성일</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="log-tbody">
            <tr>
              <td colspan="5" class="text-center" style="padding:32px">
                <div class="spinner"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div id="pagination" class="pagination"></div>
    </section>

  </main>

  <!-- Markdown 조회 Modal -->
  <div id="md-modal" class="overlay hidden">
    <div class="modal">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
        <h3 class="modal__title" style="margin:0;">마크다운 미리보기</h3>
        <button id="md-modal-close" class="btn btn--secondary btn--sm">닫기</button>
      </div>
      <div id="md-modal-content" class="md-preview">
        불러오는 중...
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/log.js"></script>
</body>
</html>
