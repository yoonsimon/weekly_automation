<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KR EC Trend 자동화 대시보드</title>
  <link rel="stylesheet" href="/static/css/style.css?v=8">
  <!-- TOAST UI Grid -->
  <link rel="stylesheet" href="https://uicdn.toast.com/grid/latest/tui-grid.css">
  <!-- Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <!-- Flowbite -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flowbite@2/dist/flowbite.min.css">
</head>
<body>

  <div class="shell">
    <!-- LNB -->
    <aside class="lnb">
      <a href="/" class="lnb__brand">KR EC Trend</a>
      <nav class="lnb__nav">
        <a href="/generate" class="lnb__item">
          <span class="lnb__label">기사 생성</span>
        </a>
        <a href="/notices" class="lnb__item">
          <span class="lnb__label">공지사항</span>
        </a>
        <a href="/log" class="lnb__item">
          <span class="lnb__label">이력</span>
        </a>
      </nav>
    </aside>

    <!-- Main -->
    <div class="shell__main">
      <header class="header">
        <div class="container">
          <h1 class="header__title">대시보드</h1>
        </div>
      </header>

      <main class="container">

        <!-- 이번 주 현황 -->
        <section class="section">
          <div class="section__header">
            <h2 class="section__title" id="week-status-title">이번 주 현황</h2>
          </div>

          <div class="quick-status">
            <div class="quick-status__card">
              <div class="quick-status__title">기사 생성</div>
              <div id="article-status" class="quick-status__badge quick-status__badge--pending">
                <span class="quick-status__dot"></span>
                <span>확인 중...</span>
              </div>
              <a href="/generate" class="quick-status__link">생성하기 &rarr;</a>
            </div>
            <div class="quick-status__card">
              <div class="quick-status__title">공지사항 수집</div>
              <div id="notice-status" class="quick-status__badge quick-status__badge--pending">
                <span class="quick-status__dot"></span>
                <span>확인 중...</span>
              </div>
              <a href="/notices" class="quick-status__link">수집하기 &rarr;</a>
            </div>
          </div>

          <div style="margin-top:16px; text-align:center;">
            <button id="btn-generate-all" class="btn btn--primary btn--lg">이번 주 전체 생성</button>
            <p style="margin-top:6px; font-size:12px; color:var(--color-text-muted);">기사 생성 + 공지사항 수집을 동시에 시작합니다</p>
          </div>
        </section>

        <!-- 최근 생성 이력 -->
        <section class="section">
          <div class="section__header">
            <h2 class="section__title">최근 생성 이력 (5건)</h2>
            <a href="/log" class="section__link">전체 이력 보기 &rarr;</a>
          </div>

          <div id="recent-grid"></div>
        </section>

      </main>
    </div>
  </div>

  <!-- Markdown 조회 Modal -->
  <div id="md-modal" class="overlay hidden">
    <div class="modal">
      <div class="modal__header" style="display:flex; align-items:center; justify-content:space-between; margin: 10px 0 0;">
        <h3 class="modal__title" style="margin:0;">마크다운 미리보기</h3>
        <button id="md-modal-close" class="btn btn--secondary btn--sm">닫기</button>
      </div>
      <div class="modal__content">
        <div class="tabs" style="margin-top: 16px;">
          <button class="modal-tab-btn active" data-modal-tab="modal-tab-md">마크다운</button>
          <button class="modal-tab-btn" data-modal-tab="modal-tab-images">원본 이미지</button>
        </div>
        <div id="modal-tab-md" class="modal-tab-panel active">
          <div id="md-modal-content" class="md-preview">
            불러오는 중...
          </div>
        </div>
        <div id="modal-tab-images" class="modal-tab-panel">
          <div class="images-toolbar">
            <span id="modal-images-count"></span>
            <div class="images-toolbar__spacer"></div>
            <button id="btn-modal-download-zip" class="btn btn--primary btn--sm">전체 다운로드 (ZIP)</button>
          </div>
          <div id="modal-images-grid" class="images-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://uicdn.toast.com/grid/latest/tui-grid.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/flowbite@2/dist/flowbite.min.js"></script>
  <script src="/static/js/api.js?v=4"></script>
  <script src="/static/js/dashboard.js?v=4"></script>
</body>
</html>
