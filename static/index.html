<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KR EC Trend 자동화 대시보드</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/css/style.css?v=11">
</head>
<body>

  <div class="shell">
    <!-- LNB -->
    <aside class="lnb">
      <a href="/" class="lnb__brand">KR EC Trend</a>
      <nav class="lnb__nav">
        <a href="/generate" class="lnb__item">
          <svg class="lnb__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <span class="lnb__label">기사 생성</span>
        </a>
        <a href="/notices" class="lnb__item">
          <svg class="lnb__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M9 14l2 2 4-4"/></svg>
          <span class="lnb__label">공지사항</span>
        </a>
        <a href="/log" class="lnb__item">
          <svg class="lnb__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
          <span class="lnb__label">이력</span>
        </a>
      </nav>
    </aside>

    <!-- Main -->
    <div class="shell__main">
      <header class="header">
        <svg class="header__icon" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="7" fill="#EC1D31"/><path d="M7 22l5-6 4 3 9-12" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 7h4v4" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <h3 class="header__title">대시보드</h3>
      </header>

      <main class="container">

        <!-- 이번 주 현황 -->
        <section class="section">
          <div class="section__header">
            <h2 class="section__title" id="week-status-title">이번 주 현황</h2>
          </div>

          <div class="quick-status">
            <div class="quick-status__card" id="card-article">
              <div class="quick-status__card-header">
                <div class="quick-status__card-icon quick-status__card-icon--article">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                </div>
                <div class="quick-status__title">기사 생성</div>
              </div>
              <div id="article-status" class="quick-status__badge quick-status__badge--pending">
                <span class="quick-status__dot"></span>
                <span>확인 중...</span>
              </div>
              <a href="/generate" class="quick-status__link">생성하기 &rarr;</a>
            </div>
            <div class="quick-status__card" id="card-notice">
              <div class="quick-status__card-header">
                <div class="quick-status__card-icon quick-status__card-icon--notice">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M9 14l2 2 4-4"/></svg>
                </div>
                <div class="quick-status__title">공지사항 수집</div>
              </div>
              <div id="notice-status" class="quick-status__badge quick-status__badge--pending">
                <span class="quick-status__dot"></span>
                <span>확인 중...</span>
              </div>
              <a href="/notices" class="quick-status__link">수집하기 &rarr;</a>
            </div>
          </div>

          <div style="margin-top:16px; text-align:center;">
            <button id="btn-generate-all" class="btn btn--primary btn--lg">이번 주 전체 생성</button>
            <p style="margin-top:6px; font-size:12px; color:var(--color-text-muted);">기사 생성 + 공지사항 수집을 동시에 시작합니다</p>
          </div>
        </section>

        <!-- 최근 생성 이력 -->
        <section class="section">
          <div class="section__header">
            <h2 class="section__title">최근 생성 이력 (5건)</h2>
            <a href="/log" class="section__link">전체 이력 보기 &rarr;</a>
          </div>

          <table class="data-table" id="recent-table">
            <thead>
              <tr>
                <th>기간</th>
                <th style="width:100px;text-align:center;">기사수</th>
                <th style="width:120px;text-align:center;">상태</th>
                <th style="width:150px;">생성일</th>
                <th style="width:100px;text-align:center;"></th>
              </tr>
            </thead>
            <tbody id="recent-tbody"></tbody>
          </table>
        </section>

      </main>
    </div>
  </div>

  <!-- Markdown 조회 Modal -->
  <div id="md-modal" class="overlay hidden">
    <div class="modal">
      <div class="modal__header" style="display:flex; align-items:center; justify-content:space-between; margin: 10px 0 0;">
        <h3 class="modal__title" style="margin:0;">마크다운 미리보기</h3>
        <button id="md-modal-close" class="btn btn--secondary btn--sm">닫기</button>
      </div>
      <div class="modal__content">
        <div class="tabs" style="margin-top: 16px;">
          <button class="modal-tab-btn active" data-modal-tab="modal-tab-md">마크다운</button>
          <button class="modal-tab-btn" data-modal-tab="modal-tab-images">원본 이미지</button>
        </div>
        <div id="modal-tab-md" class="modal-tab-panel active">
          <div id="md-modal-content" class="md-preview">
            불러오는 중...
          </div>
        </div>
        <div id="modal-tab-images" class="modal-tab-panel">
          <div class="images-toolbar">
            <span id="modal-images-count"></span>
            <div class="images-toolbar__spacer"></div>
            <button id="btn-modal-download-zip" class="btn btn--primary btn--sm">전체 다운로드 (ZIP)</button>
          </div>
          <div id="modal-images-grid" class="images-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/static/js/api.js?v=5"></script>
  <script src="/static/js/dashboard.js?v=5"></script>
</body>
</html>
