<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주간 뉴스 자동 큐레이션 대시보드</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container">
      <h1 class="header__title">주간 뉴스 자동 큐레이션 대시보드</h1>
    </div>
  </header>

  <main class="container">

    <!-- Hero: 새 기사 생성 -->
    <section class="section">
      <div class="card card--hero">
        <p>새로운 주간 뉴스 큐레이션을 시작하세요</p>
        <a href="/generate" class="btn btn--primary btn--lg">새 기사 생성</a>
      </div>
    </section>

    <!-- 최근 생성 이력 -->
    <section class="section">
      <div class="section__header">
        <h2 class="section__title">최근 생성 이력 (5건)</h2>
        <a href="/log" class="section__link">전체 이력 보기 &rarr;</a>
      </div>

      <div id="recent-table-wrap" class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th>기간</th>
              <th>기사수</th>
              <th>상태</th>
              <th>생성일</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="recent-tbody">
            <tr>
              <td colspan="5" class="text-center" style="padding:32px">
                <div class="spinner"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- Markdown 조회 Modal -->
  <div id="md-modal" class="overlay hidden">
    <div class="modal">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;">
        <h3 class="modal__title" style="margin:0;">마크다운 미리보기</h3>
        <button id="md-modal-close" class="btn btn--secondary btn--sm">닫기</button>
      </div>
      <div id="md-modal-content" class="md-preview">
        불러오는 중...
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
